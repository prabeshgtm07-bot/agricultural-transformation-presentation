name: Generate PowerPoint Presentation

on:
  push:
    branches: [ main ]

jobs:
  build-pptx:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate PowerPoint
      run: |
        python scripts/generate_presentation.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: Nepal_Agricultural_Transformation_Roadmap
        path: output/Nepal_Agricultural_Transformation_Roadmap.pptx
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: output/Nepal_Agricultural_Transformation_Roadmap.pptx
        tag_name: v${{ github.run_number }}
        body: "PowerPoint presentation auto-generated"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
