name: Generate PowerPoint Presentation

on:
  push:
    branches: [ main ]

jobs:
  build-pptx:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-pptx==0.6.23 lxml==5.1.0
    
    - name: Generate PowerPoint
      run: python scripts/generate_presentation.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nepal_Agricultural_Transformation_Roadmap
        path: output/Nepal_Agricultural_Transformation_Roadmap.pptx
